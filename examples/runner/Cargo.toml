[package]
name = "revmc-examples-runner"
publish = false

version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
categories.workspace = true
keywords.workspace = true
repository.workspace = true
exclude.workspace = true

[build-dependencies]
revmc = { workspace = true, features = ["llvm-prefer-dynamic"] }
revmc-build.workspace = true
cc = "1.0"

[dependencies]
revmc-builtins = { workspace = true, default-features = false }
revmc-context = { workspace = true, default-features = false }

revm = { workspace = true, default-features = false, features = ["std"] }

# Used by bench_curve
revmc = { workspace = true, features = ["llvm-prefer-dynamic"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
hex = "0.4"

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "bench_curve"
path = "src/bench_curve.rs"
harness = false
